name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Give permission to run gradlew
        run: chmod +x ./android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on main branch push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
          tag: "v${{ github.run_number }}"
          name: "Debug Build #${{ github.run_number }}"
          body: |
            自动构建的 Debug 版本
            
            - 提交: ${{ github.event.head_commit.message }}
            - 分支: ${{ github.ref_name }}
            - 时间: ${{ github.event.head_commit.timestamp }}
          token: ${{ secrets.GITHUB_TOKEN }}
